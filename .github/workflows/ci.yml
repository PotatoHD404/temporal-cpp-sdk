name: ci

on:
  push:
    branches: [main]
  pull_request:

# Both platforms build through Conan so the toolchain deps (gRPC, Protobuf,
# nlohmann_json) — and their CMake config packages, which Debian/Ubuntu don't
# ship — are resolved identically and reproducibly everywhere. The SDK consumes
# them via find_package(... CONFIG).
jobs:
  # macOS (arm64). Full suite: build + unit tests + integration against a dev
  # server. The `temporal` CLI is only the server binary — unrelated to the
  # Conan-provided build toolchain.
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan + Temporal CLI
        run: |
          brew install temporal
          pip install "conan>=2.0,<3"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan2-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan2-${{ runner.os }}-

      - name: Build (Conan)
        run: |
          conan profile detect --force
          conan install . -o "&:build_tests=True" --build=missing -s build_type=Release
          cmake --preset conan-release
          cmake --build --preset conan-release

      - name: Unit tests
        run: ctest --test-dir build/Release --output-on-failure -LE integration

      - name: Start Temporal dev server
        run: |
          temporal server start-dev --headless --log-level error &
          echo $! > /tmp/temporal.pid
          for i in $(seq 1 60); do
            temporal workflow list >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Integration tests
        env:
          TEMPORAL_INTEGRATION: "1"
        run: ctest --test-dir build/Release --output-on-failure -L integration

      - name: Stop Temporal dev server
        if: always()
        run: kill "$(cat /tmp/temporal.pid)" 2>/dev/null || true

  # Linux (x86-64). Build + unit tests via Conan.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install toolchain + Conan
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake make g++
          pip install "conan>=2.0,<3"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan2-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan2-${{ runner.os }}-

      - name: Build (Conan)
        run: |
          conan profile detect --force
          conan install . -o "&:build_tests=True" --build=missing -s build_type=Release
          cmake --preset conan-release
          cmake --build --preset conan-release

      - name: Unit tests
        run: ctest --test-dir build/Release --output-on-failure -LE integration
